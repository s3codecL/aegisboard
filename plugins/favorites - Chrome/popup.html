<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Extension</title>
    <style>
        :root {
            --primary: #4285F4;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --accent: #38bdf8;
        }

        body {
            width: 320px;
            margin: 0;
            padding: 16px;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .header img {
            width: 32px;
            height: 32px;
        }

        .header h1 {
            font-size: 18px;
            margin: 0;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-container {
            position: relative;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.2);
        }

        .menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .btn-link {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .btn-link:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .footer {
            margin-top: 8px;
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            display: inline-block;
            margin-right: 4px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <img src="icon.png" alt="Aegis">
            <h1>Aegis OSINT</h1>
        </div>

        <div class="search-container">
            <input type="text" id="ext-search" placeholder="Buscar en Aegis..." autocomplete="off">
        </div>

        <div class="menu">
            <a href="#" class="btn-link" id="go-dashboard">Dashboard</a>
            <a href="#" class="btn-link" id="go-admin">Admin</a>
            <a href="#" class="btn-link" id="go-incidents">Incidentes</a>
            <a href="#" class="btn-link" id="go-docs">Docs</a>
        </div>

        <div class="footer">
            <span class="status-dot"></span> aegisboard.dev • v1.9.0
        </div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
