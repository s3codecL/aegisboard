<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aegis Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />

    <!-- Bootstrap 5 CSS (layout utilities only, no Tabler) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Custom CSS (loads after Bootstrap to override correctly) -->
    <link rel="stylesheet" href="src/css/main.css" />
    <link rel="stylesheet" href="src/css/login.css" />
    <link rel="icon" href="plugins/favorites - Chrome/ico.png" type="image/png" />

    <!-- Prevent theme flash: apply saved theme before render -->
    <script>
        (function () {
            var theme = localStorage.getItem('osintTheme') || 'dark';
            document.documentElement.setAttribute('data-bs-theme', theme);
        })();
    </script>

    <!-- Login Initialization Module -->
    <script type="module" src="src/js/login-init.js"></script>
</head>

<body class="login-page">
    <div class="login-container">
        <!-- Controles Superior Derecha -->
        <div class="login-controls">
            <button class="btn btn-outline-secondary" id="theme-toggle" data-i18n-title="CHANGE_THEME"
                title="Cambiar tema">
                <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-sun" width="20" height="20" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                    <circle cx="12" cy="12" r="4"></circle>
                    <path
                        d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32l1.41-1.41">
                    </path>
                </svg>
                <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-moon" width="20" height="20"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1 -8.313 -12.454z"></path>
                </svg>
            </button>
            <button class="btn btn-outline-secondary" id="language-toggle" data-i18n-title="CHANGE_LANGUAGE"
                title="Cambiar idioma">
                <span id="lang-text" style="font-weight: bold; font-size: 0.85rem;">ES</span>
            </button>
        </div>

        <div class="login-card">
            <div class="logo-section">
                <svg class="logo-icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="1.5">
                    <path d="M12 2l7 4v5c0 5-3.5 9.5-7 11-3.5-1.5-7-6-7-11V6l7-4z" stroke-linejoin="round"
                        stroke-linecap="round"></path>
                    <path d="M9.5 10.5c.8.6 1.5.9 2.5.9s1.7-.3 2.5-.9" stroke-linecap="round"></path>
                </svg>
                <h1><span class="aegis-gradient">Aegis</span> Board</h1>
                <p data-i18n="INVESTIGATION_TOOL">Herramienta de Investigación</p>
            </div>

            <div class="tab-buttons">
                <button class="tab-btn active" data-i18n="LOGIN" onclick="switchTab('login')">Iniciar Sesión</button>
                <button class="tab-btn" data-i18n="REGISTER" onclick="switchTab('register')">Registro</button>
            </div>

            <!-- Tab: Iniciar Sesión -->
            <div id="login-tab" class="tab-content active">
                <form id="login-form">
                    <div class="form-group mb-3">
                        <label class="form-label" data-i18n="EMAIL">Email</label>
                        <input type="email" class="form-control" id="login-email" required
                            data-i18n-placeholder="PLACEHOLDER_EMAIL" placeholder="nombre@ejemplo.com">
                    </div>
                    <div class="form-group mb-3">
                        <label class="form-label" data-i18n="PASSWORD">Contraseña</label>
                        <input type="password" class="form-control" id="login-password" required
                            data-i18n-placeholder="PLACEHOLDER_PASSWORD" placeholder="••••••••">
                    </div>
                    <div class="forgot-password"
                        style="display:flex; justify-content:space-between; align-items:center;">
                        <label
                            style="display:flex;align-items:center;gap:6px;font-size:0.85rem;color:var(--text-muted);cursor:pointer;">
                            <input type="checkbox" id="remember-me" style="width:14px;height:14px;cursor:pointer;">
                            <span data-i18n="REMEMBER_ME">Recordarme</span>
                        </label>
                        <a href="#" onclick="showForgotPassword(event)" data-i18n="FORGOT_PASSWORD">¿Olvidaste tu
                            contraseña?</a>
                    </div>
                    <div id="login-recaptcha" class="g-recaptcha"></div>
                    <button type="button" class="btn-primary" id="btn-login" data-i18n="SIGN_IN">Acceder</button>
                </form>
            </div>

            <!-- Tab: Registro -->
            <div id="register-tab" class="tab-content">
                <form id="register-form">
                    <div class="form-group mb-3">
                        <label class="form-label" data-i18n="FULL_NAME">Nombre Completo</label>
                        <input type="text" class="form-control" id="register-name" required
                            data-i18n-placeholder="PLACEHOLDER_NAME" placeholder="Juan Pérez">
                    </div>
                    <div class="form-group mb-3">
                        <label class="form-label" data-i18n="EMAIL">Email</label>
                        <input type="email" class="form-control" id="register-email" required
                            data-i18n-placeholder="PLACEHOLDER_EMAIL" placeholder="nombre@ejemplo.com">
                    </div>
                    <div class="form-group mb-3">
                        <label class="form-label" data-i18n="PASSWORD">Contraseña</label>
                        <input type="password" class="form-control" id="register-password" required
                            data-i18n-placeholder="PLACEHOLDER_PASSWORD" placeholder="••••••••">
                    </div>
                    <div class="form-group mb-3 d-flex align-items-center gap-2">
                        <input type="checkbox" id="accept-terms" style="width:16px;height:16px;cursor:pointer;">
                        <label for="accept-terms" class="form-label mb-0" data-i18n="ACCEPT_TERMS"
                            style="cursor:pointer;">Acepto los términos y condiciones</label>
                    </div>
                    <div id="register-recaptcha" class="g-recaptcha"></div>
                    <button type="button" class="btn-primary" id="btn-register" data-i18n="CREATE_ACCOUNT">Crear
                        Cuenta</button>
                </form>
            </div>

            <div class="divider" data-i18n="SOCIAL_LOGIN_OR">O continúa con</div>

            <div class="oauth-buttons">
                <button class="btn-oauth" onclick="loginWithGoogle()">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="#4285F4"
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="#34A853"
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05"
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" />
                        <path fill="#EA4335"
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    Google
                </button>
                <button class="btn-oauth" onclick="loginWithGithub()">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path
                            d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                    </svg>
                    GitHub
                </button>
            </div>

            <div class="back-link">
                <a href="index.html" data-i18n="BACK_TO_HOME">← Volver al Inicio</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
